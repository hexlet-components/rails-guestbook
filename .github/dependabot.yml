version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions-all:
        patterns: ["*"]

  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    target-branch: main
    allow:
      - dependency-type: direct
      - dependency-type: indirect
    groups:
      bundler-all:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    target-branch: main
    allow:
      - dependency-type: direct
      - dependency-type: indirect
    groups:
      npm-all:
        patterns: ["*"]
